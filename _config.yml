title: Jack Skidmore
description: Essays, prayers, and projects from Jack Skidmore.
baseurl: ""
url: "https://jackskidmore.com"
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
permalink: pretty
exclude:
  - README.md

# Highlight the About nav pill on project pages (and any page can override
# its active pill with `nav_active:` in front matter).
defaults:
  - scope:
      path: "projects"
    values:
      nav_active: /about/
